name: mcp-server security

on:
  push:
    branches: [main, 'v2/**']
    paths: ['packages/mcp-server/**', '.github/workflows/mcp-server-security.yml']
  pull_request:
    paths: ['packages/mcp-server/**']
  schedule:
    # Daily re-scan so new CVEs on pinned deps fail the job even if code hasn't changed
    - cron: '17 7 * * *'

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # Lockfile lives at the repo root (npm workspaces). Install from
      # root, then audit the workspace. The previous setup tried to
      # `npm ci` from packages/mcp-server which has no local lockfile
      # and always failed.
      - name: Install (workspace + root)
        run: npm ci --workspaces --include-workspace-root
      - name: Audit (mcp-server only)
        run: npm audit --workspace=@axip/mcp-server --audit-level=moderate

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner
        # The lockfile is at the REPO ROOT (npm workspaces). Previously
        # pointed at packages/mcp-server/package-lock.json which doesn't
        # exist.
        uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --recursive

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  zod-strict-check:
    name: verify Zod .strict() on tool schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Replaces the previous line-bound grep guard which produced
      # false positives on every multi-line z.object({...}).strict()
      # block. The Node script does proper block-aware scanning and
      # accepts .strict() OR .passthrough() OR an inline strict-ok:
      # annotation.
      - name: Block-aware Zod strict check
        run: node packages/mcp-server/scripts/check-zod-strict.js

  tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install workspace
        run: npm ci --workspaces --include-workspace-root
      - name: Test
        working-directory: packages/mcp-server
        run: |
          if [ -d test ]; then
            node --test test/*.test.js
          else
            echo "No tests yet; skipping (will be required once test/ exists)"
          fi
